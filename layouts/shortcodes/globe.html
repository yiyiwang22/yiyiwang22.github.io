<div id="floating-globe" style="
    position: fixed; 
    right: 20px;        /* 距离右边 */
    top: 50%;           /* 垂直居中 */
    transform: translateY(-50%) scale(0.6); /* 缩小至 60% 且上移对齐 */
    transform-origin: right center;         /* 从右侧中心缩放 */
    z-index: 99;                            /* 确保在最上层 */
    text-align: center;
">
    <script type="text/javascript" id="mmvst_globe" src="https://mapmyvisitors.com/globe.js?d=A7Q60gJ0gQzh47tlSH6S8Cxb5u2hz4qhbj9YZ8DAxD4"></script>
    
    <style>
        /* 当屏幕宽度小于 1000px（比如平板或手机）时，隐藏地球 */
        @media (max-width: 1000px) {
            #floating-globe { display: none !important; }
        }
    </style>
</div>
